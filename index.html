<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d9480f">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Блокнот</title>
<style>
:root{
  --bg:#f6f4ef; --card:#ffffff; --text:#1f2328; --muted:#8a8f98;
  --accent:#d9480f; --accent-soft:#fdeee4; --chip:#ecebe6; --chip-on:#d9480f;
  --border:#e6e4de; --shadow:0 1px 4px rgba(0,0,0,.07);
  --danger:#c92a2a;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#121417; --card:#1c2026; --text:#e8eaed; --muted:#9aa0a8;
    --accent:#ff8a3d; --accent-soft:#3a2417; --chip:#2a2f36; --chip-on:#ff8a3d;
    --border:#2c313a; --shadow:0 1px 4px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,"Segoe UI",Roboto,sans-serif; font-size:15px;
  touch-action:manipulation;
  padding-bottom:env(safe-area-inset-bottom);
}
#app{max-width:520px; margin:0 auto;
  padding:calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 90px calc(14px + env(safe-area-inset-left))}
button{font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer}
/* 16px обязателен: iOS Safari зумит поля мельче 16px при фокусе и не отъезжает обратно */
input,textarea,select{font:inherit; font-size:16px; color:var(--text)}

.top{display:flex; align-items:center; gap:8px; padding:6px 0 14px}
.top h1{font-size:22px; margin:0; flex:1; display:flex; align-items:center; gap:8px}
.top .back{font-size:22px; padding:4px 10px 4px 0}
.iconbtn{font-size:20px; padding:6px 10px; border-radius:10px; color:var(--muted)}
.iconbtn:active{background:var(--chip)}
.iconbtn.small{font-size:16px; padding:2px 8px}

.grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); border:1px solid var(--border)}
.list-card{padding:16px 14px; cursor:pointer; touch-action:manipulation}
.list-card:active{transform:scale(.98)}
.list-card.dragging{transform:scale(1.06); box-shadow:0 8px 24px rgba(0,0,0,.28); opacity:.95; z-index:6; cursor:grabbing}
.lc-icon{font-size:30px; margin-bottom:8px; line-height:1}
.lc-photo{width:64px; height:64px; border-radius:12px; object-fit:cover; display:block; margin-bottom:2px}
.lc-name{font-weight:600; font-size:15px}
.lc-meta{font-size:12px; color:var(--muted); margin-top:3px}
.lc-repeat{font-size:11px; color:var(--accent); font-weight:600; margin-top:4px}
.repeat-badge{display:inline-block; font-size:12.5px; color:var(--accent); background:var(--accent-soft); padding:5px 12px; border-radius:12px; font-weight:600; margin-bottom:12px}
.lc-bar{height:6px; border-radius:4px; background:var(--chip); margin-top:9px; overflow:hidden}
.lc-bar-fill{height:100%; border-radius:4px; background:linear-gradient(90deg,#ffa94d,#e8590c); transition:width .3s}
.lc-bar-fill.full{background:linear-gradient(90deg,#51cf66,#2f9e44)}
.hdr-photo{width:26px; height:26px; border-radius:7px; object-fit:cover; vertical-align:-6px}
.add-card{border-style:dashed; color:var(--muted); background:transparent; box-shadow:none}

.chips{display:flex; flex-wrap:wrap; gap:8px; padding:2px 0 12px}
.chip{flex:none; padding:7px 14px; border-radius:20px; background:var(--chip); font-size:13px; font-weight:500}
.chip.on{background:var(--chip-on); color:#fff; font-weight:700}
.chip.add{background:transparent; border:1px dashed var(--muted); color:var(--muted)}
.cat-edit{display:inline-block; font-size:13px; color:var(--accent); background:var(--accent-soft); padding:7px 14px; border-radius:12px; margin:0 0 12px; font-weight:600}

.note{padding:13px 14px; margin-bottom:10px}
.n-title{font-weight:600; margin-bottom:4px}
.n-text{white-space:pre-wrap; word-break:break-word; line-height:1.45}
.n-text.clamp{display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden}
.n-foot{display:flex; align-items:center; gap:8px; margin-top:9px}
.tag{font-size:11.5px; background:var(--accent-soft); color:var(--accent); padding:3px 9px; border-radius:12px; font-weight:600}
.chipbtn{font-size:12.5px; background:var(--chip); padding:4px 10px; border-radius:12px; font-weight:500}
.n-date{font-size:11.5px; color:var(--muted); margin-left:auto}

.det{padding:2px 2px 40px}
.det .tag{display:inline-block; margin-bottom:10px}
.det-title{font-size:21px; margin:6px 0 6px; line-height:1.25}
.det-date{font-size:12.5px; color:var(--muted); margin-bottom:16px}
.det-text{white-space:pre-wrap; word-break:break-word; line-height:1.6; font-size:16px}
.det-photos{display:flex; flex-wrap:wrap; gap:10px; margin-top:18px}
.det-photo{width:calc(50% - 5px); border-radius:12px; object-fit:cover; aspect-ratio:1; cursor:pointer}
.det-remind{margin-top:20px; padding:11px 14px; background:var(--accent-soft); color:var(--accent); border-radius:12px; font-weight:600; font-size:14px}

.icon-pick{display:flex; gap:10px; align-items:center}
.icon-pick input{flex:1}

.cal-nav{display:flex; align-items:center; justify-content:space-between; margin:4px 0 14px}
.cal-title{font-weight:600; font-size:17px}
.cal-grid{display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:5px}
.cal-head{margin-bottom:6px}
.cal-wd{text-align:center; font-size:11.5px; color:var(--muted); padding:2px 0}
.cal-cell{position:relative; aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:10px; font-size:14px; color:var(--text); background:var(--chip); border:1px solid var(--border)}
.cal-cell.empty{background:transparent; border:none}
.cal-cell.today{border-color:var(--accent); color:var(--accent); font-weight:700}
.cal-cell.has{font-weight:600; color:var(--accent)}
.cal-cell .dot{position:absolute; bottom:6px; width:5px; height:5px; border-radius:50%; background:var(--accent)}

.cal-bar{display:flex; align-items:center; justify-content:space-between; width:100%; background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:14px; padding:12px 16px; margin-bottom:12px; font-weight:600; font-size:14px; color:var(--text)}
.cal-bar-arr{color:var(--muted); font-size:20px}
.cal-bar:active{transform:scale(.99)}

.ci{display:flex; align-items:center; gap:12px; padding:12px 14px; margin-bottom:8px}
.ci .box{flex:none; width:24px; height:24px; border-radius:50%; border:2px solid var(--muted); display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff}
.ci.done .box{background:var(--accent); border-color:var(--accent)}
.ci .ci-text{flex:1; word-break:break-word}
.ci-more{font-size:11px; opacity:.6; margin-left:2px}
.ci.done .ci-text{text-decoration:line-through; color:var(--muted)}
.ci .tag{flex:none}
.progress{font-size:13px; color:var(--muted); padding:0 2px 10px}

.fab{position:fixed; right:calc(50% - 245px); bottom:24px; width:58px; height:58px; border-radius:50%;
  background:var(--accent); color:#fff; font-size:30px; box-shadow:0 4px 14px rgba(0,0,0,.25); z-index:5}
@media (max-width:548px){.fab{right:20px}}
.addbar{position:fixed; left:0; right:0; bottom:0; background:var(--card); border-top:1px solid var(--border); padding:10px 14px calc(10px + env(safe-area-inset-bottom)); z-index:5}
.addbar .row{max-width:492px; margin:0 auto; display:flex; gap:8px}
.addbar input{flex:1; border:1px solid var(--border); background:var(--bg); border-radius:12px; padding:11px 13px; outline:none}
.addbar button{background:var(--accent); color:#fff; border-radius:12px; padding:0 18px; font-size:20px}
.addbar button.micbtn{background:var(--chip); color:var(--text); padding:0 14px; font-size:17px}
.micbtn.rec{background:var(--danger)!important; color:#fff!important; animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.55}}
.lbl-row{display:flex; align-items:center; justify-content:space-between}
.lbl-row .micbtn{font-size:16px; background:var(--chip); border-radius:10px; padding:5px 12px}

#overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:25; display:none; align-items:flex-end; justify-content:center}
#overlay.open{display:flex}
.sheet{background:var(--card); width:100%; max-width:520px; border-radius:20px 20px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto}
.sheet h2{margin:0 0 14px; font-size:18px}
.sheet label{display:block; font-size:12.5px; color:var(--muted); margin:12px 0 5px; font-weight:600}
.sheet input[type=text], .sheet input[type=datetime-local], .sheet textarea{width:100%; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:12px; padding:11px 13px; outline:none; color-scheme:light dark}
.sheet input[type=datetime-local]{min-height:44px}
.sheet textarea{min-height:110px; resize:vertical}
.sheet .hint{font-size:12.5px; color:var(--muted); line-height:1.45; margin-top:8px}
.btn{display:block; width:100%; text-align:center; background:var(--accent); color:#fff; border-radius:13px; padding:14px; font-weight:600; font-size:15px; margin-top:16px}
.btn.gray{background:var(--chip); color:var(--text)}
.btn.danger{background:transparent; color:var(--danger); padding:12px}
.cat-row{padding:12px 4px; border-bottom:1px solid var(--border)}
.cat-row-top{display:flex; align-items:center; justify-content:space-between}
.swatches{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
.sw{width:26px; height:26px; border-radius:50%; border:2px solid transparent}
.sw.on{border-color:var(--text); transform:scale(1.12)}
.sw.custom{background:conic-gradient(from 0deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
.sw.none{background:var(--chip); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted)}
.preview-line{font-size:13px; color:var(--muted); margin-top:16px; display:flex; align-items:center; gap:8px}
.sheet label.switch{display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text); font-weight:500; margin:18px 0 0}
.sheet label.switch input{width:20px; height:20px; margin:0}
.action{display:block; width:100%; text-align:left; padding:14px 6px; font-size:16px; border-bottom:1px solid var(--border)}
.action:last-child{border-bottom:none}
.action.danger{color:var(--danger)}
.thumbs{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}
.thumb{position:relative; width:64px; height:64px; border-radius:10px; overflow:hidden; border:1px solid var(--border)}
.thumb img{width:100%; height:100%; object-fit:cover}
.thumb .rm{position:absolute; top:0; right:0; background:rgba(0,0,0,.55); color:#fff; width:20px; height:20px; font-size:12px; border-radius:0 0 0 8px}
.addphoto{width:64px; height:64px; border-radius:10px; border:1px dashed var(--muted); color:var(--muted); font-size:22px}

#viewer{position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:20; display:none; flex-direction:column}
#viewer.open{display:flex}
#viewer .v-top{display:flex; align-items:center; color:#ddd; padding:14px 16px; font-size:14px}
#viewer .v-top .cnt{flex:1}
#viewer .v-top button{color:#fff; font-size:20px; padding:4px 12px}
#viewer .v-img{flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0 8px}
#viewer img{max-width:100%; max-height:100%; object-fit:contain}
#viewer .v-nav{display:flex; justify-content:space-between; padding:14px 22px calc(20px + env(safe-area-inset-bottom))}
#viewer .v-nav button{color:#fff; font-size:26px; padding:4px 18px}

.empty{text-align:center; color:var(--muted); padding:44px 20px; line-height:1.6}
.empty .big{font-size:40px; display:block; margin-bottom:10px}
.toast{position:fixed; left:50%; transform:translateX(-50%); bottom:100px; background:var(--text); color:var(--bg);
  padding:10px 18px; border-radius:20px; font-size:14px; z-index:30; opacity:0; transition:opacity .25s; pointer-events:none; max-width:85%}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div id="overlay"></div>
<div id="viewer"></div>
<div id="toast" class="toast"></div>

<script>
/* ---------- база ---------- */
const APP_VER='2.2';
const DB_NAME='bloknot', DB_VER=1;
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    d.createObjectStore('lists',{keyPath:'id'});
    const n=d.createObjectStore('notes',{keyPath:'id'}); n.createIndex('listId','listId');
    d.createObjectStore('photos',{keyPath:'id'});
    d.createObjectStore('meta',{keyPath:'key'});
  };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
})}
const req=r=>new Promise((res,rej)=>{r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error)});
const st=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbPut=(s,v)=>req(st(s,'readwrite').put(v));
const dbDel=(s,k)=>req(st(s,'readwrite').delete(k));
const dbGet=(s,k)=>req(st(s).get(k));
const dbAll=s=>req(st(s).getAll());
const dbByList=id=>req(st('notes').index('listId').getAll(id));
const dbClear=s=>req(st(s,'readwrite').clear());
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ---------- утилиты ---------- */
const esc=t=>String(t??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const plural=(n,a,b,c)=>{n=Math.abs(n)%100; const d=n%10; if(n>10&&n<20)return c; if(d>1&&d<5)return b; if(d===1)return a; return c};
const MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTHS_NOM=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
function fmtDate(ts){
  const d=new Date(ts), now=new Date(), y=new Date(now); y.setDate(now.getDate()-1);
  if(sameDay(d,now))return 'сегодня';
  if(sameDay(d,y))return 'вчера';
  const dd=d.getDate().toString().padStart(2,'0'), mm=(d.getMonth()+1).toString().padStart(2,'0');
  return d.getFullYear()===now.getFullYear()?`${dd}.${mm}`:`${dd}.${mm}.${d.getFullYear()}`;
}
function fmtFull(ts){
  const d=new Date(ts);
  const hh=d.getHours().toString().padStart(2,'0'), mi=d.getMinutes().toString().padStart(2,'0');
  return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}, ${hh}:${mi}`;
}
const pad2=n=>String(n).padStart(2,'0');
function fmtRemind(ts){
  const d=new Date(ts);
  return `${d.getDate()} ${MONTHS[d.getMonth()]}, ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function toLocalInput(ts){
  const d=new Date(ts);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function toICS(d){return d.getUTCFullYear()+pad2(d.getUTCMonth()+1)+pad2(d.getUTCDate())+'T'+pad2(d.getUTCHours())+pad2(d.getUTCMinutes())+'00Z'}
function escICS(s){return String(s||'').replace(/[\\;,]/g,m=>'\\'+m).replace(/\r?\n/g,'\\n')}
function buildICS(note){
  const start=new Date(note.remindAt);
  const title=(note.title||note.text||'Напоминание').slice(0,150);
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//bloknot//RU','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT','UID:'+note.id+'@bloknot','DTSTAMP:'+toICS(new Date()),
    'DTSTART:'+toICS(start),'DTEND:'+toICS(new Date(note.remindAt+30*60000)),
    'SUMMARY:'+escICS(title),'DESCRIPTION:'+escICS(note.text||''),
    'BEGIN:VALARM','ACTION:DISPLAY','TRIGGER:PT0M','DESCRIPTION:'+escICS(title),'END:VALARM',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
async function addToCalendar(note){
  const ics=buildICS(note);
  const title=(note.title||note.text||'Напоминание').slice(0,150);
  const blob=new Blob([ics],{type:'text/calendar'});
  // 1) системный «Поделиться» файлом — если поддерживается
  try{
    const file=new File([blob],'napominanie.ics',{type:'text/calendar'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title});
      return;
    }
  }catch(e){ if(e&&e.name==='AbortError') return; }
  // 2) прямой переход к событию — рабочий путь для установленного приложения на iOS
  const url=URL.createObjectURL(blob);
  location.href=url;
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}
async function addToCalendarById(id){const n=await dbGet('notes',id); if(n&&n.remindAt)addToCalendar(n)}
function clearRemind(){const el=document.getElementById('e-remind'); if(el){el.value=''; toast('Напоминание убрано (не забудь сохранить)')}}
const CAT_COLORS=['#e03131','#e8590c','#2f9e44','#1971c2','#7048e8','#c2255c'];
const CAT_GRADS=['linear-gradient(135deg,#f6416c,#ff9a9e)','linear-gradient(135deg,#fda085,#f6d365)',
  'linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#4facfe,#00f2fe)',
  'linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#30cfd0,#330867)'];
function catColor(l,name){return (l&&l.catColors&&l.catColors[name])||''}
const isGrad=c=>c&&c.indexOf('gradient')>=0;
function tagStyle(color){
  if(!color)return '';
  if(isGrad(color))return `style="background:${color};color:#fff;-webkit-background-clip:border-box"`;
  return `style="background:${color}22;color:${color}"`;
}
function chipCatStyle(color,on){
  if(!color)return '';
  if(isGrad(color))return `style="background:${color};color:#fff${on?';box-shadow:0 0 0 2px var(--text)':';opacity:.9'}"`;
  return on?`style="background:${color};color:#fff"`:`style="background:${color}22;color:${color}"`;
}
let toastTimer;
function toast(msg){const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}

/* ---------- состояние ---------- */
const S={screen:'home', listId:null, noteId:null, cat:'all', calYear:null, calMonth:null, expanded:new Set()};
const app=document.getElementById('app');

/* ---------- стартовые списки ---------- */
async function seed(){
  if(await dbGet('meta','seeded')) return;
  const defs=[
    {name:'Жена', icon:'👩', type:'notes', categories:['Еда','Одежда','Места','Желания','Прочее']},
    {name:'Дела', icon:'✅', type:'check', categories:[]},
    {name:'Работа', icon:'💼', type:'check', categories:[]},
    {name:'Болезни', icon:'💊', type:'notes', categories:[]},
  ];
  let i=0;
  for(const d of defs) await dbPut('lists',{id:uid(), order:i++, createdAt:Date.now(), ...d});
  await dbPut('meta',{key:'seeded', value:1});
}

/* ---------- отрисовка ---------- */
async function render(){
  if(S.screen==='note') return renderNote();
  if(S.screen==='calendar') return renderCalendar();
  if(S.screen==='list') return renderList();
  return renderHome();
}

async function renderHome(){
  const lists=(await dbAll('lists')).sort((a,b)=>a.order-b.order);
  for(const l of lists) if(l.repeat) await applyRepeatReset(l);
  const notes=await dbAll('notes');
  const cnt={}, done={};
  notes.forEach(n=>{cnt[n.listId]=(cnt[n.listId]||0)+1; if(n.done)done[n.listId]=(done[n.listId]||0)+1});
  app.innerHTML=`
  <header class="top"><h1>📒 Блокнот</h1><button class="iconbtn" onclick="mainMenu()">⋮</button></header>
  <button class="cal-bar" onclick="openCalendar()"><span>📅 Календарь напоминаний</span><span class="cal-bar-arr">›</span></button>
  <div class="grid">
    ${lists.map(l=>{
      const total=cnt[l.id]||0, dn=done[l.id]||0, pct=total?Math.round(dn/total*100):0;
      const isCheck=l.type==='check', showBar=isCheck&&!l.hideProgress&&total>0;
      return `
    <div class="card list-card ${isCheck?'todo':''}" data-id="${l.id}" onclick="openList('${l.id}')">
      <div class="lc-icon">${l.photo?`<img class="lc-photo" src="${l.photo}">`:esc(l.icon)}</div>
      <div class="lc-name">${esc(l.name)}</div>
      <div class="lc-meta">${isCheck
        ? `${dn} из ${total}${total?` · ${pct}%`:''}`

/* ---------- перетаскивание списков ---------- */
let suppressClick=false;
function initReorder(){
  const grid=document.querySelector('.grid'); if(!grid)return;
  grid.querySelectorAll('.list-card:not(.add-card)').forEach(card=>{
    card.addEventListener('pointerdown', e=>pressStart(e, card, grid));
  });
}
function pressStart(e, card, grid){
  if(e.pointerType==='mouse' && e.button!==0) return;
  const sx=e.clientX, sy=e.clientY;
  let moved=false;
  const timer=setTimeout(()=>{ if(!moved){ cleanup(); beginDrag(card, grid); } }, 300);
  const onMove=ev=>{ if(Math.hypot(ev.clientX-sx, ev.clientY-sy)>12){ moved=true; cleanup(); } };
  const onUp=()=>cleanup();
  function cleanup(){ clearTimeout(timer); document.removeEventListener('pointermove',onMove); document.removeEventListener('pointerup',onUp); }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}
function beginDrag(card, grid){
  if(navigator.vibrate) navigator.vibrate(15);
  suppressClick=true;
  card.classList.add('dragging');
  const prevOverflow=document.documentElement.style.overflow;
  document.documentElement.style.overflow='hidden';
  const move=ev=>{
    const el=document.elementFromPoint(ev.clientX, ev.clientY);
    const over=el&&el.closest('.list-card:not(.add-card)');
    if(over && over!==card && over.parentNode===grid){
      const r=over.getBoundingClientRect();
      const after=(ev.clientY > r.top + r.height/2) || (Math.abs(ev.clientY-(r.top+r.height/2))<8 && ev.clientX > r.left + r.width/2);
      if(after) grid.insertBefore(card, over.nextSibling);
      else grid.insertBefore(card, over);
    }
  };
  const up=async ()=>{
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    card.classList.remove('dragging');
    document.documentElement.style.overflow=prevOverflow;
    const ids=[...grid.querySelectorAll('.list-card:not(.add-card)')].map(c=>c.dataset.id);
    for(let i=0;i<ids.length;i++){ const l=await dbGet('lists',ids[i]); if(l && l.order!==i){ l.order=i; await dbPut('lists',l); } }
    setTimeout(()=>{suppressClick=false;}, 60);
    render();
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
}

/* ---------- календарь ---------- */
function openCalendar(){
  const now=new Date(); S.calYear=now.getFullYear(); S.calMonth=now.getMonth();
  S.screen='calendar'; closeModal(); history.pushState({s:'calendar'},''); render();
}
function calShift(delta){
  let m=S.calMonth+delta, y=S.calYear;
  if(m<0){m=11;y--} if(m>11){m=0;y++}
  S.calMonth=m; S.calYear=y; render();
}
async function renderCalendar(){
  const now=new Date();
  if(S.calYear==null){S.calYear=now.getFullYear(); S.calMonth=now.getMonth()}
  const y=S.calYear, m=S.calMonth;
  const notes=(await dbAll('notes')).filter(n=>n.remindAt);
  const marks={};
  notes.forEach(n=>{const d=new Date(n.remindAt); marks[y+'-'+m+'-'+d.getDate()]=marks[y+'-'+m+'-'+d.getDate()]|| (d.getFullYear()===y&&d.getMonth()===m)});
  const startDow=(new Date(y,m,1).getDay()+6)%7;
  const daysIn=new Date(y,m+1,0).getDate();
  const WD=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push('<div class="cal-cell empty"></div>');
  for(let d=1;d<=daysIn;d++){
    const has=notes.some(n=>{const dd=new Date(n.remindAt); return dd.getFullYear()===y&&dd.getMonth()===m&&dd.getDate()===d});
    const isToday=sameDay(new Date(y,m,d),now);
    cells.push(`<button class="cal-cell ${isToday?'today':''} ${has?'has':''}" onclick="openDay(${y},${m},${d})">${d}${has?'<span class="dot"></span>':''}</button>`);
  }
  app.innerHTML=`
  <header class="top">
    <button class="back" onclick="history.back()">‹</button>
    <h1>📅 Календарь</h1><span style="width:36px"></span>
  </header>
  <div class="cal-nav">
    <button class="iconbtn" onclick="calShift(-1)">‹</button>
    <div class="cal-title">${MONTHS_NOM[m]} ${y}</div>
    <button class="iconbtn" onclick="calShift(1)">›</button>
  </div>
  <div class="cal-grid cal-head">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
  <div class="cal-grid">${cells.join('')}</div>
  <div class="hint" style="margin-top:16px">Точками отмечены дни с напоминаниями. Нажми день, чтобы увидеть записи.</div>`;
}
async function openDay(y,m,d){
  const notes=(await dbAll('notes')).filter(n=>{
    if(!n.remindAt)return false; const dd=new Date(n.remindAt);
    return dd.getFullYear()===y&&dd.getMonth()===m&&dd.getDate()===d;
  }).sort((a,b)=>a.remindAt-b.remindAt);
  if(!notes.length){toast('В этот день напоминаний нет'); return}
  const rows=[];
  for(const n of notes){
    const l=await dbGet('lists',n.listId);
    const dt=new Date(n.remindAt);
    rows.push(`<button class="action" onclick="closeModal();jumpToNote('${n.id}')">
      🔔 ${pad2(dt.getHours())}:${pad2(dt.getMinutes())} · ${esc((n.title||n.text||'').slice(0,40))}
      <div class="hint" style="margin:3px 0 0">${l?esc(l.icon)+' '+esc(l.name):''}</div></button>`);
  }
  showModal(`<h2>${d} ${MONTHS[m]} ${y}</h2>${rows.join('')}`);
}

let rec=null, recBtn=null;
function micSupported(){return 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window}
function toggleMic(targetId, btn){
  if(rec){rec.stop(); return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR(); recBtn=btn;
  rec.lang='ru-RU'; rec.continuous=true; rec.interimResults=false;
  rec.onresult=e=>{
    const el=document.getElementById(targetId); if(!el)return;
    let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
    el.value=(el.value?el.value.trimEnd()+' ':'')+t.trim();
  };
  rec.onerror=ev=>{if(ev.error!=='aborted'&&ev.error!=='no-speech')toast('Не вышло распознать — попробуй 🎤 на клавиатуре')};
  rec.onend=()=>{rec=null; if(recBtn){recBtn.classList.remove('rec'); recBtn=null}};
  try{rec.start(); btn.classList.add('rec')}
  catch(e){rec=null; toast('Микрофон недоступен')}
}

function pickCat(el){
  const on=el.classList.contains('on');
  document.querySelectorAll('#e-cats .chip').forEach(c=>c.classList.remove('on'));
  if(!on) el.classList.add('on');

function drawThumbs(){
  const box=document.getElementById('e-thumbs'); if(!box)return;
  box.innerHTML=editPhotos.map((p,i)=>`<div class="thumb"><img src="${p.data}"><button class="rm" onclick="rmPhoto(${i})">✕</button></div>`).join('')
    +`<button class="addphoto" onclick="document.getElementById('e-file').click()">📷</button>`;

function rmPhoto(i){editPhotos.splice(i,1); drawThumbs()}
async function addPhotos(files){
  for(const f of files){
    try{editPhotos.push({data:await compress(f)})}
    catch(e){toast('Не удалось обработать фото')}
  }
  drawThumbs();
}
async function compress(file, max=1400, q=.82){
  const img=await createImageBitmap(file);
  let w=img.width, h=img.height;
  if(Math.max(w,h)>max){const k=max/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k)}
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  return c.toDataURL('image/jpeg',q);
}
async function saveNote(noteId){

  const catEl=document.querySelector('#e-cats .chip.on');
  const category=catEl?catEl.dataset.cat:'';
  const remEl=document.getElementById('e-remind');
  const remindAt=remEl&&remEl.value?new Date(remEl.value).getTime():null;
  const photoIds=[];
  for(const p of editPhotos){
    if(p.id){photoIds.push(p.id); continue}
    const pid=uid(); await dbPut('photos',{id:pid, data:p.data}); photoIds.push(pid);
  }
  if(noteId){
    const n=await dbGet('notes',noteId);
    for(const old of (n.photos||[])) if(!photoIds.includes(old)) await dbDel('photos',old);
    Object.assign(n,{text,title,category,photos:photoIds,remindAt});
    await dbPut('notes',n);
  }else{
    await dbPut('notes',{id:uid(), listId:S.listId, text, title, category, photos:photoIds, remindAt, done:false, createdAt:Date.now()});
  }
  closeModal(); render();
}

}
function vPrev(){vIdx=(vIdx-1+vNote.photos.length)%vNote.photos.length; drawViewer()}
function vNext(){vIdx=(vIdx+1)%vNote.photos.length; drawViewer()}
function closeViewer(){viewer.classList.remove('open'); viewer.innerHTML=''; vNote=null}
function delViewerPhoto(){
  confirmDo('Удалить это фото?', async()=>{
    await dbDel('photos',vNote.photos[vIdx]);
    vNote.photos.splice(vIdx,1);
    await dbPut('notes',vNote);
    if(vIdx>=vNote.photos.length)vIdx=Math.max(0,vNote.photos.length-1);
    closeModal(); render(); drawViewer();
  });
}

/* ---------- редактор категории (имя + цвет) ---------- */
let editCat={listId:null, orig:null, name:'', color:''};
function editCurrentCategory(){ openCategoryEditor(S.listId, S.cat) }
async function openCategoryEditor(listId, name){
  const l=await dbGet('lists',listId);
  editCat={listId, orig:name||null, name:name||'', color:name?catColor(l,name):''};
  renderCategoryEditor();
  if(!name) setTimeout(()=>{const i=document.getElementById('cat-name'); if(i)i.focus()},80);
}
function renderCategoryEditor(){
  const c=editCat.color, isCustom=c&&!isGrad(c)&&CAT_COLORS.indexOf(c)<0;
  showModal(`<h2>${editCat.orig?'Категория':'Новая категория'}</h2>
    <label>Название</label>
    <input type="text" id="cat-name" value="${esc(editCat.name)}" placeholder="Например: Одежда" oninput="editCat.name=this.value" onkeydown="if(event.key==='Enter')saveCategoryEditor()">
    <label>Цвет</label>
    <div class="swatches">
      <button class="sw none ${!c?'on':''}" onclick="setEditColor('none')" title="Без цвета">✕</button>
      ${CAT_COLORS.map((cc,i)=>`<button class="sw ${c===cc?'on':''}" style="background:${cc}" onclick="setEditColor('s',${i})"></button>`).join('')}
      <button class="sw custom ${isCustom?'on':''}" onclick="pickCustomColorEdit()" title="Свой цвет"></button>
    </div>
    <label>Градиент</label>
    <div class="swatches">
      ${CAT_GRADS.map((cc,i)=>`<button class="sw ${c===cc?'on':''}" style="background:${cc}" onclick="setEditColor('g',${i})"></button>`).join('')}
    </div>
    <input type="color" id="cat-color-input" onchange="editCat.color=this.value; renderCategoryEditor()" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none">
    <div class="preview-line">Пример: <span class="tag" ${tagStyle(c)}>${esc(editCat.name||'категория')}</span></div>
    <button class="btn" onclick="saveCategoryEditor()">Сохранить</button>
    ${editCat.orig?`<button class="btn danger" onclick="askDeleteCategory(editCat.listId, editCat.orig)">🗑 Удалить категорию</button>`:''}`);
}
function setEditColor(type,i){
  editCat.color = type==='s'?CAT_COLORS[i] : type==='g'?CAT_GRADS[i] : '';
  renderCategoryEditor();
}
function pickCustomColorEdit(){
  const inp=document.getElementById('cat-color-input');
  if(/^#[0-9a-f]{6}$/i.test(editCat.color)) inp.value=editCat.color;
  inp.click();
}
async function saveCategoryEditor(){
  const name=(editCat.name||'').trim();
  if(!name){toast('Введи название'); return}
  const l=await dbGet('lists',editCat.listId);
  l.categories=l.categories||[]; l.catColors=l.catColors||{};
  if(l.categories.some(c=>c.toLowerCase()===name.toLowerCase() && c!==editCat.orig)){toast('Такая категория уже есть'); return}
  if(editCat.orig && editCat.orig!==name){
    l.categories=l.categories.map(c=>c===editCat.orig?name:c);
    delete l.catColors[editCat.orig];
    const notes=await dbByList(l.id);
    for(const n of notes) if(n.category===editCat.orig){n.category=name; await dbPut('notes',n)}
    if(S.cat===editCat.orig) S.cat=name;
  }else if(!editCat.orig){
    l.categories.push(name); S.cat=name;
  }
  if(editCat.color) l.catColors[name]=editCat.color; else delete l.catColors[name];
  await dbPut('lists',l);
  closeModal(); render(); toast('Сохранено');
}
function askDeleteCategory(listId, name){
  confirmDo(`Удалить категорию «${name}»? Записи останутся, но станут без категории.`,
    ()=>deleteCategory(listId,name), 'Удалить категорию');
}
async function deleteCategory(listId, name){
  const l=await dbGet('lists',listId);
  l.categories=(l.categories||[]).filter(c=>c!==name);
  if(l.catColors)delete l.catColors[name];
  await dbPut('lists',l);
  const notes=await dbByList(listId);
  for(const n of notes) if(n.category===name){n.category=''; await dbPut('notes',n)}
  if(S.cat===name)S.cat='all';
  closeModal(); render(); toast('Категория удалена');
}
/* ---------- меню списка ---------- */
async function listMenu(){
  const l=await dbGet('lists',S.listId);
  showModal(`
    <button class="action" onclick="openListEditor('${l.id}')">✏️ Настроить список</button>
    ${l.type==='check'?`
    <button class="action" onclick="uncheckAll()">↩️ Снять все галочки</button>
    <button class="action" onclick="confirmDo('Удалить все отмеченные пункты?', removeChecked)">🧹 Удалить отмеченные</button>`:''}
    <button class="action danger" onclick="confirmDeleteList()">🗑 Удалить список</button>`);
}
async function uncheckAll(){
  const notes=await dbByList(S.listId);
  for(const n of notes){if(n.done){n.done=false; await dbPut('notes',n)}}
  closeModal(); render(); toast('Галочки сняты');
}
async function removeChecked(){
  const notes=await dbByList(S.listId);
  for(const n of notes) if(n.done){
    for(const p of (n.photos||[])) await dbDel('photos',p);
    await dbDel('notes',n.id);
  }
  closeModal(); render(); toast('Отмеченные удалены');
}
function confirmDeleteList(){
  showModal(`<h2>Удалить список со всеми записями?</h2>
    <button class="btn danger" onclick="deleteList()">Да, удалить</button>
    <button class="btn gray" onclick="closeModal()">Отмена</button>`);
}
async function deleteList(){
  const notes=await dbByList(S.listId);
  for(const n of notes){
    for(const p of (n.photos||[])) await dbDel('photos',p);
    await dbDel('notes',n.id);
  }
  await dbDel('lists',S.listId);
  closeModal(); S.screen='home'; render(); toast('Список удалён');
}

/* ---------- создание/настройка списка ---------- */
let listPhoto=null;
async function openListEditor(listId){
  const l=listId?await dbGet('lists',listId):null;
  listPhoto=l&&l.photo?l.photo:null;
  showModal(`
    <h2>${l?'Настройка списка':'Новый список'}</h2>
    <label>Название</label>
    <input type="text" id="l-name" value="${l?esc(l.name):''}" placeholder="Например: Поездка в Казань">
    <label>Иконка</label>
    <div class="icon-pick">
      <input type="text" id="l-icon" value="${l?esc(l.icon):'📝'}" placeholder="эмодзи">
      <button type="button" class="chipbtn" onclick="document.getElementById('l-photo-file').click()">📷 Фото</button>
    </div>
    <div id="l-photo-box"></div>
    <input type="file" id="l-photo-file" accept="image/*" hidden onchange="pickListPhoto(this.files[0])">
    ${l?'':`<label>Тип</label><div class="chips" id="l-type">
      <button class="chip on" data-t="notes" onclick="pickType(this)">📄 Заметки</button>
      <button class="chip" data-t="check" onclick="pickType(this)">☑️ Чек-лист</button>
    </div>`}
    <label>Категории (через запятую)</label>
    <input type="text" id="l-cats" value="${l?esc((l.categories||[]).join(', ')):''}" placeholder="Еда, Одежда, Места">
    <div class="hint">Категории — это вкладки-фильтры внутри списка. Можно оставить пустым.</div>
    ${l&&l.type==='check'?`<label class="switch"><input type="checkbox" id="l-progress" ${l.hideProgress?'':'checked'}> Показывать шкалу готовности на иконке</label>
    <label>🔁 Повтор (сам снимает галочки в новом периоде)</label>
    <div class="chips" id="l-repeat">
      ${[['','Нет'],['daily','Каждый день'],['weekly','Каждую неделю'],['monthly','Каждый месяц']].map(([v,t])=>`<button class="chip ${(l.repeat||'')===v?'on':''}" data-r="${v}" onclick="pickRepeat(this)">${t}</button>`).join('')}
    </div>
    <div class="hint">Например, «Ежедневная рутина»: наступил новый день — все галочки снялись, делаешь заново.</div>`:''}
    <button class="btn" onclick="saveList('${listId||''}')">Сохранить</button>`);
  drawListPhoto();
}
async function pickListPhoto(file){
  if(!file)return;
  try{listPhoto=await compress(file,256,.85); drawListPhoto()}
  catch(e){toast('Не получилось обработать фото')}
}
function drawListPhoto(){
  const box=document.getElementById('l-photo-box'); if(!box)return;
  box.innerHTML=listPhoto
    ?`<div class="thumb"><img src="${listPhoto}"><button class="rm" onclick="removeListPhoto()">✕</button></div>
      <div class="hint">Фото заменит эмодзи на иконке.</div>`:'';
}
function removeListPhoto(){listPhoto=null; drawListPhoto()}
function pickType(el){
  document.querySelectorAll('#l-type .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function pickRepeat(el){
  document.querySelectorAll('#l-repeat .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
const REPEAT_LABEL={daily:'каждый день', weekly:'каждую неделю', monthly:'каждый месяц'};
function periodKey(repeat, d=new Date()){
  if(repeat==='daily') return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
  if(repeat==='weekly'){const t=new Date(d); const dow=(t.getDay()+6)%7; t.setDate(t.getDate()-dow); return 'W'+t.getFullYear()+'-'+pad2(t.getMonth()+1)+'-'+pad2(t.getDate());}
  if(repeat==='monthly') return d.getFullYear()+'-'+pad2(d.getMonth()+1);
  return '';
}
async function applyRepeatReset(l){
  if(!l.repeat) return false;
  const key=periodKey(l.repeat);
  if(l.repeatKey===key) return false;
  const notes=await dbByList(l.id);
  for(const n of notes) if(n.done){ n.done=false; await dbPut('notes',n); }
  l.repeatKey=key; await dbPut('lists',l);
  return true;
}
async function saveList(listId){
  const name=document.getElementById('l-name').value.trim();
  if(!name){toast('Введи название'); return}
  const icon=document.getElementById('l-icon').value.trim()||'📝';
  const categories=document.getElementById('l-cats').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(listId){
    const l=await dbGet('lists',listId);
    Object.assign(l,{name,icon,categories,photo:listPhoto||null});
    const pg=document.getElementById('l-progress');
    if(pg) l.hideProgress=!pg.checked;
    const rp=document.querySelector('#l-repeat .chip.on');
    if(rp){ const nv=rp.dataset.r||null; l.repeat=nv; l.repeatKey=nv?periodKey(nv):null; }
    await dbPut('lists',l);
  }else{
    const type=document.querySelector('#l-type .chip.on').dataset.t;
    const lists=await dbAll('lists');
    const id=uid();
    await dbPut('lists',{id, name, icon, type, categories, photo:listPhoto||null, order:lists.length, createdAt:Date.now()});
  }
  closeModal(); render();
}

/* ---------- главное меню: импорт и резервные копии ---------- */
function mainMenu(){
  showModal(`
    <button class="action" onclick="openImport()">📥 Импорт от Клода</button>
    <button class="action" onclick="exportAll()">💾 Резервная копия</button>
    <button class="action" onclick="document.getElementById('restore-file').click()">♻️ Восстановить из копии</button>
    <button class="action" onclick="updateApp()">🔄 Обновить приложение</button>
    <div class="hint" style="text-align:center; padding:10px 0 2px">Версия ${APP_VER}</div>
    <input type="file" id="restore-file" accept=".json" hidden onchange="restoreAll(this.files[0])">`);
}
async function updateApp(){
  if(!navigator.onLine){toast('Нет интернета — не могу проверить обновления'); return}
  toast('Скачиваю свежую версию…');
  try{
    const resp=await fetch('./index.html',{cache:'reload'});
    if(!resp.ok) throw 0;
    if(window.caches){const ks=await caches.keys(); for(const k of ks) await caches.delete(k)}
    if('serviceWorker' in navigator){const rs=await navigator.serviceWorker.getRegistrations(); for(const r of rs) await r.unregister()}
    location.reload();
  }catch(e){toast('Не получилось скачать — попробуй позже')}
}
function openImport(){
  showModal(`
    <h2>📥 Импорт от Клода</h2>
    <div class="hint">Попроси Клода: «оформи ответ в JSON для моего блокнота» — и вставь сюда то, что он пришлёт. Формат:<br>
    <code>{"список":"Болезни","заголовок":"Ангина","текст":"..."}</code><br>
    Для чек-листа: <code>{"список":"Поездка","пункты":["паспорт","зарядка"]}</code>. Можно массив из нескольких.</div>
    <label>Вставь сюда</label>
    <textarea id="imp-text" placeholder='{"список":"...","заголовок":"...","текст":"..."}'></textarea>
    <button class="btn" onclick="doImport()">Импортировать</button>`);
}
async function doImport(){
  let t=document.getElementById('imp-text').value.trim();
  t=t.replace(/^```(json)?/i,'').replace(/```$/,'').trim();
  let data;
  try{data=JSON.parse(t)}catch(e){toast('Не получилось прочитать JSON'); return}
  if(!Array.isArray(data))data=[data];
  let added=0;
  for(const raw of data){
    const listName=raw['список']||raw.list||'Заметки';
    const title=raw['заголовок']||raw.title||'';
    const text=raw['текст']||raw.text||'';
    const category=raw['категория']||raw.category||'';
    const items=raw['пункты']||raw.items;
    const lists=await dbAll('lists');
    let l=lists.find(x=>x.name.toLowerCase()===String(listName).toLowerCase());
    if(!l){
      l={id:uid(), name:listName, icon:items?'🧳':'📄', type:items?'check':'notes', categories:[], order:lists.length, createdAt:Date.now()};
      await dbPut('lists',l);
    }
    if(category&&!(l.categories||[]).includes(category)){l.categories=[...(l.categories||[]),category]; await dbPut('lists',l)}
    if(items&&Array.isArray(items)){
      for(const it of items){await dbPut('notes',{id:uid(), listId:l.id, text:String(it), title:'', category, photos:[], done:false, createdAt:Date.now()}); added++}
    }else if(text||title){
      await dbPut('notes',{id:uid(), listId:l.id, text:String(text), title:String(title), category, photos:[], done:false, createdAt:Date.now()}); added++;
    }
  }
  closeModal(); render(); toast(`Добавлено записей: ${added}`);
}
async function exportAll(){
  const data={version:1, exportedAt:new Date().toISOString(),
    lists:await dbAll('lists'), notes:await dbAll('notes'), photos:await dbAll('photos')};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='bloknot-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  closeModal(); toast('Копия сохранена в загрузки');
}
async function restoreAll(file){
  if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    if(!data.lists)throw 0;
    await dbClear('lists'); await dbClear('notes'); await dbClear('photos');
    for(const l of data.lists)await dbPut('lists',l);
    for(const n of data.notes||[])await dbPut('notes',n);
    for(const p of data.photos||[])await dbPut('photos',p);
    await dbPut('meta',{key:'seeded',value:1});
    closeModal(); S.screen='home'; render(); toast('Данные восстановлены');
  }catch(e){toast('Файл не похож на копию блокнота')}
}

  if('serviceWorker' in navigator && location.protocol==='https:')
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
</script>
